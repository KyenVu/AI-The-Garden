behaviors:
  AgentBrain_ML:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512          # LOWERED: Network updates twice as fast
      buffer_size: 5120        # LOWERED: Requires less data before updating
      learning_rate: 1.0e-3    # INCREASED: Learns more aggressively 
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      # CURIOSITY DELETED!
    max_steps: 500000
    time_horizon: 64
    summary_freq: 10000